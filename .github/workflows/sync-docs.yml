name: Sync docs to docs repository

on:
  push:
    branches: [develop, staging, main]
    paths: ['docs/**']

jobs:
  sync-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.DOCS_SYNC_TOKEN }}

      - name: Configure git
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

      - name: Add docs remote
        run: |
          git remote add docs-remote https://x-access-token:${{ secrets.DOCS_SYNC_TOKEN }}@github.com/ademondev/test-git-submodule-docs.git || true

      - name: Push docs changes to docs repository
        run: |
          git subtree push --prefix=docs docs-remote main