name: Pull docs updates

# This action runs when the docs repository is updated
# It pulls the latest docs into the backend repository

on:
  schedule:
    # Run every hour to check for docs updates
    - cron: '0 * * * *'
  workflow_dispatch:
    # Allow manual triggering

jobs:
  update-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.DOCS_SYNC_TOKEN }}

      - name: Configure git
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

      - name: Add docs remote
        run: |
          git remote add docs-remote https://x-access-token:${{ secrets.DOCS_SYNC_TOKEN }}@github.com/ademondev/test-git-submodule-docs.git || true

      - name: Check for docs updates
        run: |
          # Get latest docs
          git fetch docs-remote
          
          # Get current docs commit in this repo
          CURRENT_DOCS_COMMIT=$(git ls-tree HEAD docs | awk '{print $3}' || echo "none")
          
          # Get latest docs commit from docs repo
          LATEST_DOCS_COMMIT=$(git rev-parse docs-remote/main)
          
          echo "Current: $CURRENT_DOCS_COMMIT"
          echo "Latest: $LATEST_DOCS_COMMIT"
          
          # Clone docs repo to temp location
          git clone https://x-access-token:${{ secrets.DOCS_SYNC_TOKEN }}@github.com/ademondev/test-git-submodule-docs.git /tmp/docs-repo
          
          # Copy latest docs files
          cp /tmp/docs-repo/*.md docs/ 2>/dev/null || echo "No markdown files to copy"
          
          # Check if there are changes
          if git diff --quiet docs/; then
            echo "📝 Docs are up to date"
            echo "HAS_CHANGES=false" >> $GITHUB_ENV
          else
            echo "📝 Found docs updates"
            echo "HAS_CHANGES=true" >> $GITHUB_ENV
          fi

      - name: Commit docs updates
        if: env.HAS_CHANGES == 'true'
        run: |
          git add docs/
          git commit -m "Auto-update docs from docs repository

          Automated sync of latest documentation changes"
          git push origin main
          echo "✅ Docs updated automatically"